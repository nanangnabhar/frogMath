<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lompat Katak Matematika</title>
    <style>
        :root {
            --water-color: #40E0D0;
            --water-dark: #20b2aa;
            --sky-color: #87CEEB;
            --leaf-color: #32cd32;
            --leaf-dark: #228b22;
            --text-color: #333;
            --primary-font: 'Comic Sans MS', 'Nunito', 'Quicksand', 'Arial Rounded MT Bold', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

        body { font-family: var(--primary-font); background-color: #1a1a1a; color: var(--text-color); overflow: hidden; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; }

        #game-container { position: relative; width: 100%; height: 100%; max-width: 1024px; max-height: 768px; background: linear-gradient(to bottom, var(--sky-color) 0%, var(--water-dark) 40%, var(--water-color) 100%); overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        .water-bg { position: absolute; bottom: 0; width: 200%; height: 60%; background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 10%, transparent 20%); background-size: 100px 100px; animation: moveWater 10s linear infinite; z-index: 1; pointer-events: none; }

        @keyframes moveWater { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; pointer-events: auto; }

        .stats-box { background: rgba(255, 255, 255, 0.8); border-radius: 20px; padding: 10px 20px; display: flex; gap: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 3px solid white; }

        .stat-item { font-size: 1.2rem; font-weight: bold; display: flex; align-items: center; gap: 8px; color: #d946ef; }

        .stat-item span.value { color: #2563eb; font-size: 1.4rem; }

        .controls { display: flex; gap: 10px; }

        .btn-icon { background: white; border: none; border-radius: 50%; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: transform 0.2s; }

        .btn-icon:hover { transform: scale(1.1); }

        #play-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        #question-container { position: absolute; top: 15vh; width: 100%; text-align: center; pointer-events: none; }

        #question-box { display: inline-block; background: #fff; padding: 15px 40px; border-radius: 30px; font-size: 3rem; font-weight: bold; color: #ec4899; box-shadow: 0 10px 20px rgba(0,0,0,0.15); border: 5px solid #fbcfe8; }

        #pads-container { position: absolute; top: 50%; left: 0; width: 100%; transform: translateY(-50%); display: flex; justify-content: center; gap: 3vw; padding: 20px; flex-wrap: wrap; }

        .pad-wrapper { position: relative; cursor: pointer; animation: float 3s ease-in-out infinite; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .pad-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 2rem; font-weight: bold; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.6); }

        #frog { position: absolute; bottom: 8vh; left: 50%; width: 80px; height: 80px; transform: translateX(-50%); z-index: 20; transition: transform 0.3s; }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center; z-index: 200; opacity: 0; pointer-events: none; }
        .screen.active { opacity: 1; pointer-events: auto; }
        .modal-box { background: white; padding: 40px; border-radius: 30px; text-align: center; width: 500px; }
        .game-logo { width: 100%; max-width: 300px; margin-bottom: 20px; }
        .btn-primary { background: #10b981; color: white; border: none; padding: 15px 40px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="water-bg"></div>
        <div class="ui-layer">
            <div class="top-bar">
                <div class="stats-box">
                    <div class="stat-item">Skor: <span class="value" id="score-val">0</span></div>
                </div>
            </div>
        </div>

        <div id="play-area">
            <div id="question-container"><div id="question-box">? × ?</div></div>
            <div id="pads-container"></div>
        </div>

        <div id="frog">
            <svg viewBox="0 0 100 100"><ellipse cx="50" cy="65" rx="35" ry="30" fill="#4ade80"/><ellipse cx="50" cy="40" rx="40" ry="25" fill="#4ade80"/><circle cx="25" cy="22" r="10" fill="#fff"/><circle cx="75" cy="22" r="10" fill="#fff"/></svg>
        </div>

        <div class="screen active" id="start-screen">
            <div class="modal-box">
                <img src="https://imgur.com/ImM0Tg7.png" class="game-logo">
                <button class="btn-primary" id="btn-start">MULAI MAIN</button>
            </div>
        </div>
    </div>

    <script>
        let score = 0, currentAnswer = 0;
        const scoreVal = document.getElementById('score-val');
        const padsContainer = document.getElementById('pads-container');
        const questionBox = document.getElementById('question-box');

        function generateQuestion() {
            padsContainer.innerHTML = '';
            const a = Math.floor(Math.random() * 9) + 1;
            const b = Math.floor(Math.random() * 9) + 1;
            currentAnswer = a * b;
            questionBox.textContent = `${a} × ${b}`;

            const options = [currentAnswer];
            while(options.length < 4) {
                let wrong = Math.floor(Math.random() * 81) + 1;
                if(!options.includes(wrong)) options.push(wrong);
            }
            options.sort(() => Math.random() - 0.5);

            options.forEach(opt => {
                const pad = document.createElement('div');
                pad.className = 'pad-wrapper';
                pad.innerHTML = `<svg width="120" height="60"><ellipse cx="60" cy="30" rx="55" ry="25" fill="#32cd32"/></svg><div class="pad-text">${opt}</div>`;
                pad.onclick = () => checkAnswer(opt);
                padsContainer.appendChild(pad);
            });
        }

        function checkAnswer(val) {
            if(val === currentAnswer) {
                score += 10;
                scoreVal.textContent = score;
                generateQuestion();
            } else {
                alert("Salah! Coba lagi.");
            }
        }

        document.getElementById('btn-start').onclick = () => {
            document.getElementById('start-screen').classList.remove('active');
            generateQuestion();
        };
    </script>
</body>
</html>
